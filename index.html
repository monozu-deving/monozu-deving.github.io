---
layout: home
author_profile: true
classes: wide
---

<div class="hero-container">
    <div class="hero-content-split">
        <!-- Left: Intro Text -->
        <div class="intro-pane">
            <div class="glass-tag">Personal Portfolio</div>
            <h2 class="glow-title" style="font-size: 2.5rem;">Hello World("print")</h2>
            <p class="description-text">
                Robotics Engineer & AI Developer<br>

            </p>

            <!-- Removed redundant action-row links -->
        </div>

        <!-- Right: Visual "Liquid" Element / Floating Cards -->
        <div class="visual-pane">
            <div class="floating-liquid-blob"></div>
            <div class="glass-stat-card card-1">
                <span class="label">Total Posts</span>
                <span class="value">{{ site.posts.size | default: 0 }}</span>
            </div>
            <div class="glass-stat-card card-2">
                <span class="label">Major</span>
                <span class="value">AI & Robotics</span>
            </div>
        </div>
    </div>
</div>

<style>
    :root {
        --accent-color: rgba(120, 160, 255, 0.6);
    }

    .hero-container {
        width: 100%;
        min-height: 45vh;
        /* Reduced from 70vh */
        display: flex;
        align-items: center;
        padding: 1.5rem 0;
        margin-bottom: 2rem;
        /* Reduced from 5rem */
    }

    .hero-content-split {
        display: grid;
        grid-template-columns: 1.2fr 1fr;
        gap: 4rem;
        width: 100%;
        align-items: center;
    }

    .intro-pane {
        text-align: left;
    }

    .glass-tag {
        display: inline-block;
        padding: 0.4rem 1rem;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 1rem;
        font-size: 0.8rem;
        color: var(--accent-color);
        margin-bottom: 2rem;
        text-transform: uppercase;
        letter-spacing: 0.1em;
    }

    .glow-title {
        font-size: clamp(1.8rem, 4vw, 2.8rem);
        font-weight: 850;
        line-height: 1.2;
        margin-bottom: 1.5rem;
        background: linear-gradient(to right, #fff, #bbb);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    .description-text {
        font-size: 1.1rem;
        color: rgba(255, 255, 255, 0.45);
        line-height: 1.7;
        max-width: 480px;
        margin-bottom: 2.5rem;
    }

    .action-row {
        display: flex;
        gap: 1rem;
        flex-wrap: wrap;
        /* Navigation is already gooey, let's keep it consistent */
        filter: url('#gooey');
    }

    /* Right Pane Visuals */
    .visual-pane {
        position: relative;
        height: 400px;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .floating-liquid-blob {
        position: absolute;
        width: 300px;
        height: 300px;
        background: radial-gradient(circle, var(--accent-color) 0%, transparent 70%);
        filter: blur(60px);
        opacity: 0.3;
        animation: pulse 8s infinite alternate;
    }

    .glass-stat-card {
        position: absolute;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(15px);
        padding: 1.5rem;
        border-radius: 1.5rem;
        display: flex;
        flex-direction: column;
        min-width: 160px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
    }

    .card-1 {
        top: 15%;
        right: 20%;
        transform: rotate(4deg);
        z-index: 2;
    }

    .card-2 {
        top: 40%;
        right: 5%;
        transform: rotate(-4deg);
        z-index: 1;
    }

    .label {
        font-size: 0.8rem;
        color: rgba(255, 255, 255, 0.4);
        margin-bottom: 0.5rem;
    }

    .value {
        font-size: 1.5rem;
        font-weight: 700;
        color: #fff;
    }

    @keyframes pulse {
        0% {
            transform: scale(1) translate(0, 0);
        }

        100% {
            transform: scale(1.2) translate(20px, -20px);
        }
    }

    @media (max-width: 1024px) {
        .hero-content-split {
            grid-template-columns: 1fr;
            text-align: center;
        }

        .intro-pane {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .description-text {
            margin-left: auto;
            margin-right: auto;
        }

        .action-row {
            justify-content: center;
        }

        .visual-pane {
            display: none;
        }

        /* Hide visuals on mobile for focus */
    }
</style>
