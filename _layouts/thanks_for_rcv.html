---
---
<!doctype html>
<html lang="ko">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#050505">
  <meta name="robots" content="noindex, nofollow">
  <title>{{ page.title | default: "" }} · {{ site.name }}</title>
  <meta name="description" content="{{ page.description | default: '이름과 개인 코드로 편지를 확인합니다.' }}">
  <link rel="stylesheet" href="{{ '/assets/css/thanks-for-rcv.css' | relative_url }}">
</head>

<body class="thanks-page thanks-page--gate" data-letter-index="{{ '/assets/data/thanks-letters.json' | relative_url }}">
  <div class="thanks-grid" aria-hidden="true"></div>

  <header class="thanks-header">
    <a class="thanks-brand" href="{{ '/' | relative_url }}" aria-label="Monozu 홈으로">
      <span class="thanks-brand__mark" aria-hidden="true">M</span>
      <span>MONOZU</span>
    </a>
    <span class="thanks-status" id="letter-status"><i aria-hidden="true"></i> PRIVATE LETTERS</span>
  </header>

  <main class="thanks-gate" id="letter-gate">
    <section class="thanks-intro" aria-labelledby="thanks-title">
      <p class="thanks-kicker">PRIVATE LETTER</p>
      <h1 id="thanks-title">편지<br><em>확인하기</em></h1>
      <div class="thanks-description">
        {{ content }}
      </div>

      <form class="thanks-form" id="letter-form" novalidate>
        <div class="thanks-field">
          <label for="recipient-name">이름</label>
          <div class="thanks-input-row">
            <span class="thanks-input-icon" aria-hidden="true">⌕</span>
            <input id="recipient-name" name="recipient" type="text" inputmode="text" autocomplete="name"
              placeholder="이름" aria-describedby="letter-help letter-result" required>
          </div>
        </div>
        <div class="thanks-field">
          <label for="letter-code">개인 코드</label>
          <div class="thanks-input-row">
            <span class="thanks-input-icon thanks-input-icon--lock" aria-hidden="true">◇</span>
            <input id="letter-code" name="code" type="password" autocomplete="off" placeholder="개별 전달받은 코드"
              aria-describedby="letter-help letter-result" required>
          </div>
        </div>
        <button class="thanks-submit" id="letter-submit" type="submit">
          <span>편지 확인하기</span>
          <span aria-hidden="true">↗</span>
        </button>
        <p class="thanks-help" id="letter-help">이름과 개인 코드는 브라우저 안에서만 편지 확인에 사용됩니다.</p>
        <p class="thanks-result" id="letter-result" role="status" aria-live="polite"></p>
      </form>

      <noscript>
        <p class="thanks-noscript">편지를 확인하려면 브라우저에서 JavaScript를 켜 주세요.</p>
      </noscript>
    </section>

    <aside class="thanks-seal" aria-hidden="true">
      <img src="{{ '/assets/images/thanks-for-rcv/letter-seal.png' | relative_url }}" alt="" loading="lazy">
    </aside>
  </main>

  <main class="letter-shell" id="letter-view" hidden>
    <nav class="letter-nav" aria-label="편지 탐색">
      <button id="letter-close" type="button"><span aria-hidden="true">←</span> 닫기</button>
      <span id="letter-date"></span>
    </nav>

    <article class="letter-card">
      <header class="letter-card__header">
        <p class="letter-to" id="letter-recipient"></p>
        <h1 id="letter-title" tabindex="-1"></h1>
      </header>

      <div class="letter-content" id="letter-content"></div>

      <footer class="letter-signature">
        <span>FROM.</span>
        <strong id="letter-from"></strong>
      </footer>
    </article>

    <p class="letter-postscript">이 편지는 입력한 개인 코드로 브라우저 안에서만 복호화되었습니다.</p>
  </main>

  <footer class="thanks-footer">
    <span>Private page.</span>
    <span>CLIENT-SIDE ENCRYPTED <i aria-hidden="true"></i> {{ site.time | date: "%Y" }}</span>
  </footer>

  <script src="{{ '/assets/js/thanks-for-rcv.js' | relative_url }}" defer></script>
</body>

</html>
